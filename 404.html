<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#101720">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&amp;family=Instrument+Sans:wght@400..600&amp;family=Newsreader:opsz,wght@6..72,300..600&amp;display=swap" rel="stylesheet">
  <title>Page not found | Max Harvey</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      min-height: 100svh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: #c8cdd1;
      background: radial-gradient(circle at 80% 75%, rgba(191,106,61,.35), transparent 34%), linear-gradient(145deg, #0a1119, #1c2833 70%, #4c372f);
      font-family: "Instrument Sans", sans-serif;
    }
    body::after {
      position: fixed;
      inset: 0;
      content: "";
      opacity: .13;
      background-image: linear-gradient(rgba(232,225,211,.08) 1px, transparent 1px), linear-gradient(90deg, rgba(232,225,211,.08) 1px, transparent 1px);
      background-size: 52px 52px;
    }
    main { position: relative; z-index: 1; width: min(720px, calc(100% - 44px)); }
    p { margin: 0 0 20px; color: #df9c6d; font: 11px/1.4 "IBM Plex Mono", monospace; letter-spacing: .16em; text-transform: uppercase; }
    h1 { max-width: 650px; margin: 0; color: #f0ebe1; font: 350 clamp(54px, 11vw, 104px)/.95 "Newsreader", serif; letter-spacing: -.04em; }
    h1 em { color: #df9c6d; font-weight: 300; }
    a { display: inline-flex; gap: 20px; margin-top: 42px; padding: 11px 18px; color: #17130f; border-radius: 999px; background: #df9c6d; font-size: 14px; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <p>404 / Trajectory lost</p>
    <h1>This air mass drifted <em>off course.</em></h1>
    <a href="/">Return to the source <span aria-hidden="true">↗</span></a>
  </main>
</body>
</html>
